<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TERMINAL ACCESS - HEPPY LINUX</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fira+Code:wght@300;500;700&display=swap');
        body, html { margin: 0; padding: 0; width: 100vw; height: 100vh; background-color: #000; font-family: 'Fira Code', monospace; overflow: hidden; color: #0f0; }
        #matrix { position: fixed; top: 0; left: 0; z-index: 0; opacity: 0.3; }
        .wrapper { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); display: flex; flex-direction: column; align-items: center; width: 85%; z-index: 10; }
        .btn-init { background: transparent; color: #0f0; border: 1px solid #0f0; padding: 18px 35px; font-size: 1rem; cursor: pointer; letter-spacing: 5px; font-weight: 300; transition: 0.4s; box-shadow: 0 0 10px rgba(0, 255, 0, 0.2); }
        #scanner-box { display: none; flex-direction: column; align-items: center; }
        .fingerprint { width: 100px; height: 100px; fill: #0f0; opacity: 0.8; }
        .laser { position: absolute; top: 0; left: 0; width: 100%; height: 2px; background: #0f0; box-shadow: 0 0 15px #0f0; animation: scan 2s infinite ease-in-out; }
        @keyframes scan { 0%, 100% { top: 0%; } 50% { top: 100%; } }
        #profile-section { display: none; width: 100%; animation: reveal 0.8s ease-out; }
        .identity-card { background: rgba(0, 15, 0, 0.92); border: 1px solid rgba(0, 255, 0, 0.4); padding: 45px 20px; border-radius: 2px; text-align: center; backdrop-filter: blur(10px); }
        .naga-kali { font-size: 75px; margin-bottom: 25px; display: block; filter: drop-shadow(0 0 15px #0f0); animation: pulse 2s infinite; }
        .terminal-prompt { background: #111; padding: 12px; border-radius: 4px; font-size: 0.85rem; margin-bottom: 35px; border: 1px solid #222; text-align: left; display: inline-block; }
        .user-title { font-size: 2.2rem; font-weight: 700; letter-spacing: 12px; color: #0f0; margin-bottom: 12px; text-transform: uppercase; }
        .sub-id { font-size: 1.15rem; letter-spacing: 3px; color: #ffffff; margin-bottom: 35px; }
        .loc-footer { font-size: 0.75rem; letter-spacing: 2px; color: #008800; padding-top: 25px; border-top: 1px solid rgba(0, 255, 0, 0.15); display: inline-block; width: 90%; }
        @keyframes reveal { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }
    </style>
</head>
<body>
    <canvas id="matrix"></canvas>
    <div class="wrapper">
        <div id="step-1"><button class="btn-init" onclick="startScan()">INITIALIZE SYSTEM</button></div>
        <div id="scanner-box">
            <div style="position: relative;">
                <svg class="fingerprint" viewBox="0 0 512 512"><path d="M256,0C114.6,0,0,114.6,0,256s114.6,256,256,256s256-114.6,256-256S397.4,0,256,0z M256,480c-123.7,0-224-100.3-224-224S132.3,32,256,32s224,100.3,224,224S379.7,480,256,480z"/><path d="M256,128c-70.7,0-128,57.3-128,128c0,8.8,7.2,16,16,16s16-7.2,16-16c0-52.9,43.1-96,96-96s96,43.1,96,96c0,8.8,7.2,16,16,16s16-7.2,16-16C384,185.3,326.7,128,256,128z"/></svg>
                <div class="laser"></div>
            </div>
            <div style="margin-top:25px; letter-spacing: 4px; font-size: 0.8rem;">IDENTIFYING...</div>
        </div>
        <div id="profile-section">
            <div class="identity-card">
                <span class="naga-kali">🐲</span>
                <div class="terminal-prompt">
                    <span style="color: #ff5555;">┌──(</span><span style="color: #5555ff; font-weight: bold;">heppy@Mr.X-Linux</span><span style="color: #ff5555;">)-[</span><span style="color: #ffffff;">~</span><span style="color: #ff5555;">]</span><br>
                    <span style="color: #ff5555;">└─</span><span style="color: #55ff55; font-weight: bold;">$</span> <span style="color: #fff;">whoami</span>
                </div>
                <div class="user-title">HEPPY</div>
                <div class="sub-id">IDENTITY: Mr.X</div>
                <div class="loc-footer">CENTRAL JAVA, INDONESIA</div>
            </div>
        </div>
    </div>
    <script>
        const canvas = document.getElementById('matrix');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;
        const drops = Array(Math.floor(canvas.width/14)).fill(1);
        function draw() {
            ctx.fillStyle = "rgba(0,0,0,0.1)"; ctx.fillRect(0,0,canvas.width,canvas.height);
            ctx.fillStyle = "#030"; ctx.font = "14px monospace";
            drops.forEach((y, i) => {
                ctx.fillText(Math.floor(Math.random()*2), i*14, y*14);
                if(y*14 > canvas.height && Math.random() > 0.975) drops[i] = 0; drops[i]++;
            });
        }
        setInterval(draw, 50);
        function startScan() {
            document.getElementById('step-1').style.display = 'none';
            document.getElementById('scanner-box').style.display = 'flex';
            setTimeout(() => {
                document.getElementById('scanner-box').style.display = 'none';
                document.getElementById('profile-section').style.display = 'block';
                speak();
            }, 2500);
        }
        function speak() {
            const speechText = "System access granted... hello... welcome back to Heppy Linux, Mister X from Central Java, Indonesia";
            const speech = new SpeechSynthesisUtterance(speechText);
            speech.lang = 'en-US'; speech.pitch = 0.1; speech.rate = 0.8;
            window.speechSynthesis.speak(speech);
        }
    </script>
</body>
</html>
